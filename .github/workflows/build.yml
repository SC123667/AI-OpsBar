name: Build AI OpsBar

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift Version
        run: swift --version

      - name: Build Debug
        run: swift build

      - name: Build Release Bundle
        run: ./scripts/build_app.sh

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ai-opsbar-app
          path: dist/AI OpsBar.app
          if-no-files-found: error

      - name: Upload Repository Metadata
        uses: actions/upload-artifact@v4
        with:
          name: ai-opsbar-metadata
          path: |
            README.md
            CHANGELOG.md
            LICENSE
          if-no-files-found: error
